<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodies | Premium Dark Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script type="text/javascript">
       (function(){
          emailjs.init("406DU1EvAhpxD6htM"); 
       })();
    </script>

    <style>
        :root { 
            --primary: #800000; /* খয়েরি */
            --accent: #ff4757; 
            --dark-bg: #121212; 
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --gradient: linear-gradient(135deg, #800000, #b30000);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--dark-bg); color: var(--text); padding-bottom: 100px; }

        /* Header */
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #000; transition: 0.4s; padding: 40px 20px; z-index: 2000; border-right: 2px solid var(--primary); }
        .sidebar.active { left: 0; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 15px; background: #222; }

        /* Hero */
        .hero { height: 35vh; background: var(--gradient); display: flex; align-items: center; justify-content: center; text-align: center; border-bottom: 5px solid #000; padding: 20px; }
        #welcome-text { font-size: 2.2rem; font-weight: 800; text-shadow: 3px 3px 10px rgba(0,0,0,0.5); }

        /* Menu */
        .container { padding: 40px 5%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(128, 0, 0, 0.3); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }

        /* Inputs & Buttons */
        .btn { background: var(--gradient); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 1rem; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; overflow-y: auto; }
        .form-box { background: #fff; color: #333; padding: 35px; border-radius: 25px; width: 90%; max-width: 450px; position: relative; }
        .form-box h2 { color: var(--primary); margin-bottom: 20px; font-weight: 800; }
        label { display: block; margin-top: 10px; font-size: 0.85rem; font-weight: bold; color: #555; text-align: left; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }

        /* Checkout Bar */
        .checkout-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-top: 3px solid var(--primary); z-index: 900; }

        footer { background: #000; padding: 40px; text-align: center; border-top: 1px solid #222; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .social-links a { color: white; text-decoration: none; background: #1a1a1a; padding: 10px 20px; border-radius: 25px; border: 1px solid #333; font-size: 0.8rem; transition: 0.3s; }
        .social-links a:hover { background: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button onclick="toggleSidebar()" style="color:white; float:right; border:none; background:none; font-size: 30px; cursor: pointer;">✕</button>
        <div style="text-align: center; margin-top: 60px;">
            <img id="user-pico" src="https://via.placeholder.com/100" class="profile-pic">
            <h3 id="side-name">Guest User</h3>
            <p id="side-email" style="opacity: 0.6; font-size: 14px;">Welcome to Foodies</p>
        </div>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="font-size: 28px; cursor: pointer; color: var(--accent); border: none; background: none;">☰</button>
        <div class="logo">FOOD<span>IES</span></div>
        <button class="btn" style="width:auto; padding: 8px 20px;" onclick="openModal('loginModal')">Login</button>
    </header>

    <section class="hero">
        <h1 id="welcome-text"></h1>
    </section>

    <div class="modal" id="loginModal">
        <div class="form-box">
            <h2>Join Foodies</h2>
            <label>Full Name</label>
            <input type="text" id="u-name" placeholder="Enter your name">
            
            <label>Gmail Address</label>
            <input type="email" id="u-email" placeholder="example@gmail.com">
            
            <label>Set Password</label>
            <input type="password" id="u-pass" placeholder="••••••••">
            
            <label>Date of Birth</label>
            <input type="date" id="u-bday">
            
            <label>Profile Picture</label>
            <input type="file" id="u-pic" accept="image/*">
            
            <button class="btn" onclick="makeAccount()">Create My Account</button>
            <button onclick="closeModal('loginModal')" style="background:none; border:none; color:#777; margin-top:15px; cursor:pointer; width:100%;">Maybe Later</button>
        </div>
    </div>

    <div class="modal" id="qtyModal">
        <div class="form-box">
            <h3 id="m-item-name" style="color:var(--primary)">Item</h3>
            <label>Quantity</label>
            <input type="number" id="o-qty" value="1" min="1">
            <label>Full Delivery Address</label>
            <input type="text" id="o-loc" placeholder="Street, City, Area">
            <button class="btn" onclick="addToCart()">Add to My List</button>
            <button class="btn" style="background:#777; margin-top:10px;" onclick="closeModal('qtyModal')">Cancel</button>
        </div>
    </div>

    <div class="container">
        <h2 style="margin-bottom: 30px; border-left: 5px solid var(--accent); padding-left: 15px;">Delicious Menu</h2>
        <div class="menu-grid" id="menu-display"></div>
    </div>

    <div class="checkout-bar">
        <div><h3 id="c-total">Total: $0</h3></div>
        <button class="btn" style="width:auto; background:#2ed573; margin:0;" onclick="finalCheckout()">Confirm & Download Invoice</button>
    </div>

    <footer>
        <p style="opacity: 0.7;">Website Developed By:</p>
        <span style="font-size: 1.5rem; color: var(--accent); font-weight: bold; display: block; margin: 10px 0;">Md. Akash Mia</span>
        <div class="social-links">
            <a href="https://www.facebook.com/share/18cbndifQM/" target="_blank">Facebook</a>
            <a href="https://wa.me/8801322135538" target="_blank">WhatsApp</a>
            <a href="https://github.com/mdakash38" target="_blank">GitHub</a>
        </div>
        <p style="font-size: 0.8rem; opacity: 0.4; margin-top: 20px;">© 2026 Foodies Premium | All Rights Reserved</p>
    </footer>

    <script>
        let user = { name: '', email: '', loc: '', bday: '' };
        let cart = [];
        let activeF = {};

        const foods = [
            { name: "Spicy Burger", price: 10, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" },
            { name: "Cheese Pizza", price: 15, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" },
            { name: "Chicken Pasta", price: 12, img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" },
            { name: "Cold Coke", price: 3, img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" },
            { name: "Fried Chicken", price: 14, img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=400" },
            { name: "Hot Coffee", price: 4, img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400" }
        ];

        window.onload = () => {
            const grid = document.getElementById('menu-display');
            foods.forEach(f => {
                grid.innerHTML += `<div class="card"><img src="${f.img}"><h3>${f.name}</h3><p style="color:var(--accent); font-weight:bold; font-size:1.2rem; margin:10px 0;">$${f.price}</p><button class="btn" onclick="openQty('${f.name}', ${f.price})">Order Now</button></div>`;
            });
            typeWriter("Explore Foodies Premium");
        };

        function typeWriter(txt) {
            let i = 0; const el = document.getElementById('welcome-text'); el.innerHTML = "";
            function type() { if (i < txt.length) { el.innerHTML += txt.charAt(i); i++; setTimeout(type, 100); } }
            type();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function makeAccount() {
            user.name = document.getElementById('u-name').value;
            user.email = document.getElementById('u-email').value;
            user.bday = document.getElementById('u-bday').value;
            if(!user.name || !user.email) return alert("Please fill Name and Gmail!");

            const file = document.getElementById('u-pic').files[0];
            if(file) {
                const r = new FileReader();
                r.onload = (e) => { document.getElementById('user-pico').src = e.target.result; };
                r.readAsDataURL(file);
            }
            document.getElementById('side-name').innerText = user.name;
            document.getElementById('side-email').innerText = user.email;
            closeModal('loginModal');
            typeWriter("Welcome, " + user.name + "!");
        }

        function openQty(n, p) {
            if(!user.name) { alert("Please login first!"); return openModal('loginModal'); }
            activeF = { n, p };
            document.getElementById('m-item-name').innerText = "Order " + n;
            openModal('qtyModal');
        }

        function addToCart() {
            let q = parseInt(document.getElementById('o-qty').value);
            user.loc = document.getElementById('o-loc').value;
            if(!user.loc) return alert("Address is required!");
            cart.push({ n: activeF.n, p: activeF.p, q: q, t: activeF.p * q });
            document.getElementById('c-total').innerText = "Total: $" + cart.reduce((s, i) => s + i.t, 0);
            closeModal('qtyModal');
        }

        function finalCheckout() {
            if(cart.length === 0) return alert("Your list is empty!");
            const deliveryKey = "FD-" + Math.floor(1000 + Math.random() * 9000);
            let summary = cart.map(i => `${i.n} x ${i.q}`).join(", ");
            const total = cart.reduce((s, i) => s + i.t, 0);

            // Send Email notification
            emailjs.send('service_3g2kcee', 'template_twosid7', {
                customer_name: user.name,
                customer_email: user.email,
                order_details: summary,
                grand_total: "$" + total,
                location: user.loc,
                delivery_key: deliveryKey
            }).then(() => alert("Order Placed Successfully!")).catch(err => console.log(err));

            // GENERATE STYLISH PDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Background Header
            doc.setFillColor(128, 0, 0); // Maroon
            doc.rect(0, 0, 210, 40, 'F');
            
            // Logo / Title
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(24);
            doc.setFont("helvetica", "bold");
            doc.text("FOODIES PREMIUM", 105, 25, null, null, "center");
            
            // Invoice Info
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(`Invoice ID: ${deliveryKey}`, 20, 50);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 150, 50);
            
            // Customer Details Box
            doc.setDrawColor(200, 200, 200);
            doc.rect(20, 55, 170, 30);
            doc.setFontSize(11);
            doc.text("CUSTOMER DETAILS:", 25, 62);
            doc.setFont("helvetica", "normal");
            doc.text(`Name: ${user.name}`, 25, 70);
            doc.text(`Email: ${user.email}`, 25, 76);
            doc.text(`Address: ${user.loc}`, 25, 82);

            // Table Header
            doc.setFillColor(240, 240, 240);
            doc.rect(20, 95, 170, 10, 'F');
            doc.setFont("helvetica", "bold");
            doc.text("Item Name", 25, 101);
            doc.text("Qty", 110, 101);
            doc.text("Total Price", 160, 101);

            // Table Content
            let y = 112;
            doc.setFont("helvetica", "normal");
            cart.forEach(i => {
                doc.text(i.n, 25, y);
                doc.text(i.q.toString(), 112, y);
                doc.text("$" + i.t, 163, y);
                doc.line(20, y+2, 190, y+2);
                y += 10;
            });

            // Grand Total
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(128, 0, 0);
            doc.text(`GRAND TOTAL: $${total}`, 130, y + 10);

            // Secret Key Box
            doc.setDrawColor(128, 0, 0);
            doc.rect(20, y + 25, 170, 20);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.text("SECRET DELIVERY KEY:", 30, y + 33);
            doc.setFontSize(16);
            doc.text(deliveryKey, 100, y + 38);

            // Footer
            doc.setFontSize(9);
            doc.setTextColor(100, 100, 100);
            doc.text("Thank you for ordering with Foodies Premium!", 105, 285, null, null, "center");

            doc.save(`Foodies_Invoice_${deliveryKey}.pdf`);
        }
    </script>
</body>
</html>
